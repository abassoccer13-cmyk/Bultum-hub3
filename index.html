<style>
:root {
  --navy:    #0f2347;
  --navy2:   #1a3a6e;
  --teal:    #0c9488;
  --amber:   #f59e0b;
  --orange:  #f97316;
  --red:     #dc2626;
  --green:   #059669;
  --blue:    #2563eb;
  --bg:      #f5f3ef;
  --surface: #ffffff;
  --border:  #e8e4dd;
  --text:    #0f2347;
  --muted:   #6b7280;
  --r:       16px;
  --r-sm:    10px;
  --sh:      0 2px 12px rgba(15,35,71,.08);
  --sh-lg:   0 8px 32px rgba(15,35,71,.14);
}
*  { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
button, input, select, textarea { font-family: 'DM Sans', sans-serif; }

/* scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1cdc6; border-radius: 99px; }

/* animations */
@keyframes spin    { to { transform: rotate(360deg); } }
@keyframes fadeUp  { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pop     { 0% { transform: scale(.88); opacity: 0; } 80% { transform: scale(1.03); } 100% { transform: scale(1); opacity: 1; } }
@keyframes qshake  { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

.spin  { animation: spin 1s linear infinite; display: inline-block; }
.fade  { animation: fadeUp .3s ease both; }
.pop   { animation: pop .35s cubic-bezier(.34,1.56,.64,1) both; }
.ch:hover { transform: translateY(-2px); box-shadow: var(--sh-lg) !important; transition: all .15s; }
.rh:hover { background: #f5f8ff !important; cursor: pointer; }

/* ── HEADER ── */
.hub-hdr {
  background: linear-gradient(135deg, var(--navy) 0%, #1a3a6e 55%, #0f4060 100%);
  padding: 0 32px;
  display: flex;
  align-items: center;
  gap: 18px;
  height: 88px;
  box-shadow: 0 4px 24px rgba(0,0,0,.25);
  position: relative;
  z-index: 10;
}
.hub-logo {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--amber), var(--orange));
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(245,158,11,.45);
}
.hub-name {
  font-family: 'Instrument Serif', serif;
  font-size: 23px;
  color: white;
  letter-spacing: -.3px;
  line-height: 1.1;
}
.hub-sub {
  font-size: 11px;
  color: rgba(255,255,255,.55);
  margin-top: 1px;
  font-weight: 500;
  letter-spacing: .2px;
}
.grade-switcher {
  display: flex;
  gap: 3px;
  background: rgba(255,255,255,.1);
  border-radius: 10px;
  padding: 3px;
  margin-left: 12px;
}
.grade-btn {
  min-width: 30px; height: 28px;
  border: none;
  border-radius: 7px;
  background: transparent;
  color: rgba(255,255,255,.65);
  font-size: 12px; font-weight: 700;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s;
  padding: 0 6px;
}
.grade-btn:hover  { background: rgba(255,255,255,.15); color: white; }
.grade-btn.active {
  background: var(--amber);
  color: var(--navy);
  box-shadow: 0 2px 8px rgba(245,158,11,.4);
}
.hdr-right {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.mastery-chip {
  font-size: 10px; font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  color: white;
  white-space: nowrap;
}

/* ── TAB BAR ── */
.hub-tabs {
  background: #0a1b33;
  display: flex;
  padding: 0 22px;
  gap: 0;
  overflow-x: auto;
  border-top: 3px solid var(--amber);
  border-bottom: 1px solid rgba(255,255,255,.08);
  position: relative;
  z-index: 9;
}
.hub-tabs::-webkit-scrollbar { height: 0; }
.hub-tab {
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  color: rgba(255,255,255,.5);
  padding: 14px 17px;
  font-size: 12.5px; font-weight: 600;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.hub-tab:hover { color: rgba(255,255,255,.8); }
.hub-tab.active {
  color: white;
  font-weight: 800;
  border-bottom-color: var(--amber);
}

/* ── CONTENT ── */
.hub-body { max-width: 1380px; margin: 0 auto; padding: 28px 22px; }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border-radius: var(--r);
  padding: 22px;
  box-shadow: var(--sh);
  border: 1px solid rgba(0,0,0,.04);
}
.card-title {
  font-family: 'Instrument Serif', serif;
  font-size: 20px;
  color: var(--navy);
  margin-bottom: 4px;
}
.page-title {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  color: var(--navy);
  margin-bottom: 4px;
}
.page-sub { font-size: 13px; color: var(--muted); margin-bottom: 22px; }

/* ── BUTTONS ── */
.btn {
  border: none; border-radius: 10px;
  padding: 9px 18px;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-navy {
  background: var(--navy);
  color: white;
  box-shadow: 0 2px 8px rgba(15,35,71,.2);
}
.btn-navy:hover { background: var(--navy2); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(15,35,71,.3); }
.btn-amber {
  background: linear-gradient(135deg, var(--amber), var(--orange));
  color: var(--navy);
  box-shadow: 0 2px 10px rgba(245,158,11,.35);
}
.btn-amber:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,158,11,.45); }
.btn-outline {
  background: white;
  color: var(--navy);
  border: 1.5px solid var(--border);
}
.btn-outline:hover { border-color: var(--navy); }

/* ── INPUTS ── */
input[type=text], input[type=number], input[type=email], select, textarea {
  border: 1.5px solid var(--border) !important;
  border-radius: var(--r-sm) !important;
  padding: 9px 12px !important;
  font-size: 13px !important;
  background: white !important;
  color: var(--text) !important;
  transition: border-color .15s, box-shadow .15s !important;
  outline: none !important;
}
input[type=text]:focus, input[type=number]:focus, select:focus, textarea:focus {
  border-color: var(--teal) !important;
  box-shadow: 0 0 0 3px rgba(12,148,136,.12) !important;
}

/* ── MASTERY BADGES ── */
.mb { border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 800; display: inline-block; }
.mb-b { background: #fef2f2; color: #dc2626; }
.mb-d { background: #fffbeb; color: #d97706; }
.mb-p { background: #eff6ff; color: #2563eb; }
.mb-a { background: #f0fdf4; color: #059669; }

/* ── STAT CARDS ── */
.stat {
  background: white;
  border-radius: var(--r);
  padding: 20px;
  box-shadow: var(--sh);
  border-top: 4px solid;
}
.stat-val {
  font-family: 'Instrument Serif', serif;
  font-size: 34px;
  line-height: 1;
  margin-top: 8px;
}
.stat-lbl { font-size: 13px; font-weight: 700; margin-top: 5px; }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* ── PILLS / FILTERS ── */
.pill {
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px; font-weight: 700;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--muted);
  transition: all .12s;
}
.pill:hover { border-color: var(--navy); color: var(--navy); }
.pill.on { background: var(--navy); border-color: var(--navy); color: white; }
.pill.on-amber { background: var(--amber); border-color: var(--amber); color: var(--navy); }

/* ── STANDARD CARDS ── */
.std-card {
  background: white;
  border-radius: var(--r);
  padding: 16px 18px;
  box-shadow: var(--sh);
  border-left: 4px solid;
  transition: transform .15s, box-shadow .15s;
}
.std-card:hover { transform: translateY(-2px); box-shadow: var(--sh-lg); }

/* ── QUARTER CARDS ── */
.q-card {
  background: white;
  border-radius: var(--r);
  padding: 14px 18px;
  box-shadow: var(--sh);
  border-top: 3px solid var(--navy);
  cursor: pointer;
  transition: all .15s;
}
.q-card:hover  { transform: translateY(-2px); box-shadow: var(--sh-lg); }
.q-card.active { background: var(--navy); color: white; }

/* ── SCORE BUTTON ── */
.score-btn {
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  border: 1.5px solid;
  transition: all .12s;
}

/* ── SECTION LABEL ── */
.sec-label {
  font-size: 11px; font-weight: 800;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
</style>

/* ── Firebase + Auth + Firestore helpers ── */
function signInWithGoogle(){
  /* Wait for Firebase then sign in */
  var tries=0;
  function attempt(){
    if(window.fbAuth){
      var provider=new firebase.auth.GoogleAuthProvider();
      provider.addScope("email");
      provider.addScope("profile");
      window.fbAuth.signInWithPopup(provider)
        .then(function(result){
          console.log("Signed in:", result.user.email);
        })
        .catch(function(e){
          console.error("Sign in error:", e.code, e.message);
          if(e.code==="auth/popup-blocked"){
            /* Fall back to redirect */
            window.fbAuth.signInWithRedirect(provider);
          } else {
            alert("Sign in failed: "+e.message);
          }
        });
    } else if(tries<50){
      tries++;
      setTimeout(attempt,200);
    } else {
      alert("Firebase not ready. Please refresh the page and try again.");
    }
  }
  attempt();
}

function copyText(text){
  try{
    if(navigator.clipboard&&window.isSecureContext){
      navigator.clipboard.writeText(text).catch(function(){fallbackCopy(text);});
    } else {
      fallbackCopy(text);
    }
  } catch(e){ fallbackCopy(text); }
}
function fallbackCopy(text){
  var ta=document.createElement("textarea");
  ta.value=text;
  ta.style.cssText="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;";
  document.body.appendChild(ta);
  ta.focus();ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta);
}
function api(prompt,mt){
  var fetchP=fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:mt||1000,messages:[{role:"user",content:prompt}]})
  }).then(function(r){
    return r.json().then(function(data){
      if(!r.ok){
        return Promise.reject(new Error((data&&data.error&&data.error.message)||("HTTP error "+r.status)));
      }
      return data;
    });
  });
  var timeoutP=new Promise(function(_,rej){
    setTimeout(function(){rej(new Error("timeout"));},60000);
  });
  return Promise.race([fetchP,timeoutP]);
}

/* ── SVG BAR CHART (no library needed) ── */
function BarChart(props){
  var data=props.data||[];
  var w=props.width||500,h2=props.height||180;
  var pad={top:10,right:10,bottom:40,left:36};
  var cw=w-pad.left-pad.right,ch=h2-pad.top-pad.bottom;
  if(!data.length)return h("div",{style:{height:h2,display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8",fontSize:13}},"No data yet");
  var bw=Math.max(4,Math.floor(cw/data.length)-2);
  var yTicks=[0,25,50,75,100];
  return h("svg",{viewBox:"0 0 "+w+" "+h2,style:{width:"100%",height:h2,overflow:"visible"}},
    /* grid */
    yTicks.map(function(t){
      var y=pad.top+ch*(1-t/100);
      return h("g",{key:t},
        h("line",{x1:pad.left,y1:y,x2:pad.left+cw,y2:y,stroke:"#f0f0f0",strokeWidth:1}),
        h("text",{x:pad.left-4,y:y+4,fontSize:9,fill:"#94a3b8",textAnchor:"end"},t)
      );
    }),
    /* bars */
    data.map(function(d,i){
      var bh=ch*(d.value/100);
      var x=pad.left+i*(cw/data.length)+(cw/data.length-bw)/2;
      var y=pad.top+ch-bh;
      var m=gm(d.value);
      var fill=m?m.color:"#6366f1";
      return h("g",{key:i},
        h("rect",{x:x,y:y,width:bw,height:bh,fill:fill,rx:2}),
        d.value>0?h("text",{x:x+bw/2,y:y-3,fontSize:7,fill:fill,textAnchor:"middle",fontWeight:"bold"},d.value):null
      );
    }),
    /* x labels */
    data.map(function(d,i){
      var x=pad.left+i*(cw/data.length)+(cw/data.length)/2;
      return h("text",{key:i,x:x,y:h2-4,fontSize:props.smallLabels?6.5:8,fill:"#64748b",textAnchor:"end",transform:"rotate(-45,"+x+","+(h2-4)+")",title:d.label},
        d.label.length>8?d.label.slice(0,8):d.label
      );
    }),
    /* axes */
    h("line",{x1:pad.left,y1:pad.top,x2:pad.left,y2:pad.top+ch,stroke:"#e2e8f0",strokeWidth:1}),
    h("line",{x1:pad.left,y1:pad.top+ch,x2:pad.left+cw,y2:pad.top+ch,stroke:"#e2e8f0",strokeWidth:1})
  );
}

/* ── TAB: MASTERY TRACKER ── */
function printTracker(stu,scores,stds,quarters){
  if(!stu) return;
  var stuScores=scores[stu.id]||{};
  var MLABELS=["Beginning","Developing","Proficient","Advanced"];
  var MCOLORS=["#dc2626","#d97706","#2563eb","#059669"];
  var MRANGES=[[0,59],[60,74],[75,89],[90,100]];
  function getMastery(sc){
    if(sc==null) return null;
    for(var i=0;i<MRANGES.length;i++){if(sc>=MRANGES[i][0]&&sc<=MRANGES[i][1])return i;}
    return null;
  }
  var allVals=stds.map(function(s){return stuScores[s.id];}).filter(function(v){return v!=null;});
  var overall=allVals.length?Math.round(allVals.reduce(function(a,b){return a+b;},0)/allVals.length):null;
  var om=getMastery(overall);

  var rows="";
  quarters.forEach(function(q){
    var qStds=stds.filter(function(s){return s.q===q.id;});
    rows+='<tr><td colspan="4" style="background:#1c3d6e;color:white;padding:8px 12px;font-weight:700;font-size:13px">'+(q.full||q.label)+' &mdash; '+(q.dates||"")+'</td></tr>';
    qStds.forEach(function(std){
      var sc=stuScores[std.id];
      var mi=getMastery(sc);
      var isELA=std.s==="ela"||std.subj==="ela";
      rows+='<tr style="border-bottom:1px solid #e2e8f0">'
        +'<td style="padding:6px 12px;font-size:11px;font-weight:700;color:'+(isELA?"#059669":"#2563eb")+'">'+(std.code||std.id)+'</td>'
        +'<td style="padding:6px 12px;font-size:12px;color:#374151">'+(std.t||std.title||"")+'</td>'
        +'<td style="padding:6px 12px;text-align:center;font-size:13px;font-weight:800;color:'+(mi!=null?MCOLORS[mi]:"#cbd5e1")+'">'+(sc!=null?sc+"%":"—")+'</td>'
        +'<td style="padding:6px 12px;text-align:center;font-size:11px;font-weight:700;color:'+(mi!=null?MCOLORS[mi]:"#cbd5e1")+'">'+(mi!=null?MLABELS[mi]:"—")+'</td>'
        +'</tr>';
    });
  });

  var html='<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<title>Mastery Report — '+stu.name+'</title>'
    +'<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;padding:32px;color:#1a1a2e}'
    +'h1{font-size:22px;color:#1c3d6e;margin-bottom:4px}h2{font-size:14px;font-weight:400;color:#64748b;margin-bottom:20px}'
    +'.badge{display:inline-block;padding:4px 14px;border-radius:4px;font-weight:700;font-size:13px}'
    +'table{width:100%;border-collapse:collapse;margin-top:16px}'
    +'th{background:#f8fafc;padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:#64748b;border-bottom:2px solid #e2e8f0}'
    +'tr:nth-child(even){background:#fafbfd}'
    +'@media print{body{padding:16px}.no-print{display:none}}'
    +'</style></head><body>'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #1c3d6e">'
    +'<div><h1>Mastery Tracker Report</h1><h2>'+stu.name+'</h2>'
    +'<div style="font-size:11px;color:#94a3b8">Printed: '+new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})+'</div></div>'
    +(overall!=null?'<div style="text-align:right"><div style="font-size:48px;font-weight:900;color:'+(om!=null?MCOLORS[om]:"#94a3b8")+';line-height:1">'+overall+'%</div>'
    +'<span class="badge" style="background:'+(om!=null?MCOLORS[om]:"#e2e8f0")+';color:white">'+(om!=null?MLABELS[om]:"No data")+'</span>'
    +'<div style="font-size:11px;color:#94a3b8;margin-top:4px">'+allVals.length+" of "+stds.length+' assessed</div></div>':"")
    +'</div>'
    +'<button class="no-print" onclick="window.print()" style="background:#1c3d6e;color:white;border:none;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px">&#128424; Print / Save as PDF</button>'
    +'<table><thead><tr><th style="width:90px">Code</th><th>Standard</th><th style="width:70px;text-align:center">Score</th><th style="width:100px;text-align:center">Mastery</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table>'
    +'<div style="margin-top:24px;padding-top:16px;border-top:1px solid #e2e8f0;font-size:10px;color:#94a3b8;display:flex;justify-content:space-between">'
    +'<span>MN K-8 Standards Hub</span><span>Mastery Levels: Beginning 0–59% | Developing 60–74% | Proficient 75–89% | Advanced 90–100%</span></div>'
    +'</body></html>';

  try{
    var blob=new Blob([html],{type:"text/html"});
    var url=URL.createObjectURL(blob);
    var w=window.open(url,"_blank");
    if(!w){
      // Popup blocked fallback - open in same tab
      document.open(); document.write(html); document.close();
    } else {
      setTimeout(function(){URL.revokeObjectURL(url);},10000);
    }
  } catch(e){
    // Final fallback
    var w2=window.open("","_blank");
    if(w2){w2.document.write(html);w2.document.close();}
  }
}

/* ── TAB: DASHBOARD ── */
function TabDash(p){
  var _STD = p.activeStds||STD;
  var gradeLabel = p.grade==="K"?"Kindergarten":(p.grade||"4")+"th";

  /* ── state ── */
  var rptTypeS=useState("summary"); var rptType=rptTypeS[0]; var setRptType=rptTypeS[1];
  var rptS=useState("");            var rpt=rptS[0];          var setRpt=rptS[1];
  var rptLoadS=useState(false);     var rptLoad=rptLoadS[0];  var setRptLoad=rptLoadS[1];
  var rptCpS=useState(false);       var rptCp=rptCpS[0];      var setRptCp=rptCpS[1];
  var rptStuS=useState(null);        var rptStu=rptStuS[0];    var setRptStu=rptStuS[1];
  var rptSubjS=useState("all");      var rptSubj=rptSubjS[0];  var setRptSubj=rptSubjS[1];

  /* ── derived data ── */
  var cavd=useMemo(function(){
    return _STD.filter(function(s){return p.ds==="all"||s.s===p.ds;}).map(function(std){
      var vals=p.students.map(function(stu){return p.scores[stu.id]&&p.scores[stu.id][std.id];}).filter(function(v){return v!=null;});
      var avg=vals.length?Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length):0;
      return{label:std.code,value:avg,title:std.t};
    }).filter(function(d){return d.value>0;});
  },[p.students,p.scores,p.ds,_STD]);

  var sqd=useMemo(function(){
    if(!p.dStu)return[];
    return Q.map(function(q){
      var rel=_STD.filter(function(s){return s.q===q.id&&(p.ds==="all"||s.s===p.ds);});
      var vals=rel.map(function(s){return p.scores[p.dStu.id]&&p.scores[p.dStu.id][s.id];}).filter(function(v){return v!=null;});
      var avg=vals.length?Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length):0;
      return{label:q.label,value:avg};
    });
  },[p.dStu,p.scores,p.ds,_STD]);

  var stats=useMemo(function(){
    var all=[];p.students.forEach(function(s){all=all.concat(Object.values(p.scores[s.id]||{}));});
    var avg=all.length?Math.round(all.reduce(function(a,b){return a+b;},0)/all.length):0;
    var prof=all.filter(function(v){return v>=75;}).length;
    var need=all.filter(function(v){return v<60;}).length;
    return{avg:avg,pct:all.length?Math.round(100*prof/all.length):0,need:need,total:all.length};
  },[p.students,p.scores]);

  /* ── AI report generator ── */
  function genReport(){
    if(rptLoad)return;
    setRptLoad(true);setRpt("");

    var gradeStr = p.grade==="K"?"Kindergarten":(p.grade||"4")+"th Grade";

    // Always use the base STD (grade-4 original) for score lookups,
    // since all student scores are keyed to those standard IDs.
    // This gives real data regardless of which grade tab is active.
    var scoredStds = STD;

    // Build per-student summaries with NAMED standards
    var stuLines = p.students.map(function(stu){
      var sc = p.scores[stu.id]||{};
      var all = scoredStds.map(function(s){ return sc[s.id]; }).filter(function(v){ return v!=null; });
      var avg = all.length ? Math.round(all.reduce(function(a,b){return a+b;},0)/all.length) : null;

      var lowStds = scoredStds.filter(function(s){ return sc[s.id]!=null && sc[s.id]<60; })
                              .map(function(s){ return s.code+' "'+s.t.slice(0,30)+'" ('+sc[s.id]+'%)'; }).slice(0,3);
      var profStds = scoredStds.filter(function(s){ return sc[s.id]!=null && sc[s.id]>=90; })
                               .map(function(s){ return s.code+' "'+s.t.slice(0,25)+'" ('+sc[s.id]+'%)'; }).slice(0,2);

      var line = stu.name+": overall avg "+(avg!=null ? avg+"%" : "no scores yet");
      if(lowStds.length)  line += " | STRUGGLING: "+lowStds.join("; ");
      if(profStds.length) line += " | ADVANCED: "+profStds.join("; ");
      return line;
    }).join("\n");

    // Class-wide stats
    var allScores = p.students.flatMap(function(stu){ return Object.values(p.scores[stu.id]||{}); });
    var classAvg  = allScores.length ? Math.round(allScores.reduce(function(a,b){return a+b;},0)/allScores.length) : 0;
    var profPct   = allScores.length ? Math.round(100*allScores.filter(function(v){return v>=75;}).length/allScores.length) : 0;
    var belowPct  = allScores.length ? Math.round(100*allScores.filter(function(v){return v<60;}).length/allScores.length) : 0;

    // Weakest standards across the class

/* ── TAB: LESSON PLANS ── */
function TabLessons(p){
  var _STD=p.activeStds||STD;
  var gradeLabel=p.grade==="K"?"Kindergarten":(p.grade||"4")+"th";
  var isYoung=(p.grade==="K"||p.grade==="1"||p.grade==="2");
  var qfS=useState("all");var qf=qfS[0];var setQf=qfS[1];
  var sfS=useState("all");var sf=sfS[0];var setSf=sfS[1];
  var srS=useState("");var sr=srS[0];var setSr=srS[1];
  var selS=useState(null);var sel=selS[0];var setSel=selS[1];
  var planS=useState("");var plan=planS[0];var setPlan=planS[1];
  var ldS=useState(false);var ld=ldS[0];var setLd=ldS[1];
  var cpS=useState(false);var cp=cpS[0];var setCp=cpS[1];
  var showSettS=useState(false); var showSett=showSettS[0]; var setShowSett=showSettS[1];
  var planStyleS=useState("standard"); var planStyle=planStyleS[0]; var setPlanStyle=planStyleS[1];
  var extraNotesS=useState(""); var extraNotes=extraNotesS[0]; var setExtraNotes=extraNotesS[1];
  /* lesson customization state */
  var q1S=useState(""); var q1=q1S[0]; var setQ1=q1S[1]; /* teaching style */
  var q2S=useState(""); var q2=q2S[0]; var setQ2=q2S[1]; /* class needs */
  var q3S=useState(""); var q3=q3S[0]; var setQ3=q3S[1]; /* activity preference */
  var q4S=useState(""); var q4=q4S[0]; var setQ4=q4S[1]; /* pacing */
  var q5S=useState(""); var q5=q5S[0]; var setQ5=q5S[1]; /* special context */
  var fileTextS=useState(""); var fileText=fileTextS[0]; var setFileText=fileTextS[1];
  var fileNameS=useState(""); var fileName=fileNameS[0]; var setFileName=fileNameS[1];
  var fileLoadS=useState(false); var fileLoad=fileLoadS[0]; var setFileLoad=fileLoadS[1];
  var flt=_STD.filter(function(s){return (qf==="all"||s.q===Number(qf))&&(sf==="all"||s.s===sf)&&(sr===""||s.t.toLowerCase().indexOf(sr.toLowerCase())>=0||s.code.toLowerCase().indexOf(sr.toLowerCase())>=0);});

  function selectStd(std){
    setSel(std); setPlan("");
  }

  function gen(std){
    if(!std) return;
    setSel(std); setPlan(""); setLd(true);
    try {
      var qi=Q.find(function(q){return q.id===std.q;})||{full:"Quarter "+std.q,dates:""};
      var subj=std.s==="math"?"Mathematics":"English Language Arts";
      var customContext="";
      if(q1) customContext+="\n\nTeaching style preference: "+q1;
      if(q2) customContext+="\nClass needs / learning profile: "+q2;
      if(q3) customContext+="\nPreferred activity types: "+q3;
      if(q4) customContext+="\nPacing / time preference: "+q4;
      if(q5) customContext+="\nAdditional context: "+q5;
      if(fileText) customContext+="\n\n--- TEACHER-UPLOADED REFERENCE MATERIAL ---\n"+fileText.slice(0,1500)+"\n--- END OF REFERENCE MATERIAL ---\nIncorporate relevant ideas, vocabulary, or examples from the above material into the lesson plan where appropriate.";
      if(extraNotes) customContext+="\n\nAdditional teacher instructions: "+extraNotes;
      var STYLE_PROMPTS={
        standard: "Standard format: clear headers, 2-3 sentences per section, balanced pacing.",
        extended: "Extended format: elaborate each section with detailed teacher notes, examples, discussion questions, and 4-6 sentences per section. Include a TEACHER TIPS section at the end.",
        short:    "Brief format: bullet points only, max 2 bullets per section. One-glance planning sheet.",
        creative: "Creative format: theme the entire lesson around a story, game, or real-world scenario. Include a catchy lesson title, a narrative hook in the warm-up, and make every activity part of the story arc.",
        workshop: "Workshop model: structure as mini-lesson (10 min), independent work time (20 min), small group conferences (15 min), share (10 min), debrief (5 min). Include conferring notes.",
        culturally_responsive: "Culturally responsive format: open each section with a connection to students' lives or community. Include discussion prompts that value multiple perspectives. Suggest diverse examples and representation.",
        inquiry:  "Inquiry-based format: replace direct instruction with student-driven questions. Open with a provocative prompt or phenomenon. Guide students to discover the concept through exploration before naming it.",
        intervention: "Intervention-focused format: break every step into micro-progressions. Include explicit error analysis, corrective feedback scripts, and a re-teach protocol at the end. Add sentence frames throughout."
      };
      var styleNote=STYLE_PROMPTS[planStyle]||STYLE_PROMPTS.standard;
      customContext+="\n\nLESSON PLAN STYLE: "+styleNote;

      var pr="You are a "+gradeLabel+" grade MN teacher. Write a focused 60-min lesson plan.\n\n"+"Grade: "+gradeLabel+" | Subject: "+subj+"\nStandard: "+std.code+": "+std.t+"\n"+"Description: "+std.d+"\n\n"+"USE THESE HEADERS:\nLEARNING OBJECTIVE\nMATERIALS\nVOCABULARY (3 terms)\n"+"WARM-UP (5 min)\nDIRECT INSTRUCTION (15 min)\nGUIDED PRACTICE (15 min)\n"+"INDEPENDENT PRACTICE (10 min)\nEXIT TICKET (5 min)\nDIFFERENTIATION\n\n"+"Each section: 2-3 sentences. Age-appropriate for "+gradeLabel+" grade students."+customContext+(isYoung?" YOUNG LEARNER STYLE (grade "+gradeLabel+"): Bold emoji title (e.g. DINO MATH! or PUPPY FUN!). Max 6 ultra-short problems: emoji+number+blank only. Draw box after each problem. Ten-frames and tally marks for K-1. Cheer every 3 problems. End with YOU DID IT + teacher stamp box. NO jargon. NO long sentences. Numbers max 10 for K, 20 for 1st, 100 for 2nd.":"")
      api(pr, 1000)
        .then(function(d){
          var txt=gt(d);
          var planTxt=txt&&txt.trim()?txt:"The AI returned an empty response. Please try again.";
          setPlan(planTxt);
          /* Save to shared App state for slide deck continuity */
          if(p.setLastPlan&&planTxt&&planTxt.length>50){
            p.setLastPlan({
              stdId:std.id,stdCode:std.code,stdTitle:std.t,
              planText:planTxt,
              q1:q1,q2:q2,q3:q3,q4:q4,q5:q5,
              style:planStyle,grade:p.grade,
              extraNotes:extraNotes
            });
          }
          setLd(false);
        })
        .catch(function(err){
          var msg=err&&err.message?err.message:"";
          if(msg==="timeout"||msg.indexOf("timed out")>=0){
            setPlan("Generation is taking longer than expected. Please try again — the server may be busy.");
          } else if(msg.indexOf("fetch")>=0||msg.indexOf("network")>=0||msg.indexOf("CORS")>=0){
            setPlan("Network error. Make sure you are using this inside Claude.ai.");
          } else if(msg){
            setPlan("Error: "+msg);
          } else {
            setPlan("Something went wrong. Please try again.");
          }
          setLd(false);
        });
    } catch(e) {
      setPlan("Error building request: "+e.message);
      setLd(false);
    }
  }
  function handleFile(e){
    var file=e.target.files&&e.target.files[0];
    if(!file) return;
    setFileName(file.name);
    setFileLoad(true);
    var reader=new FileReader();
    reader.onload=function(ev){
      var result=ev.target.result;
      /* Strip binary/base64 noise - keep readable text only */
      var text="";
      if(typeof result==="string"){
        text=result.replace(/[^\x20-\x7E\n\r\t]/g," ").replace(/\s{3,}/g,"\n").trim();
      }
      setFileText(text||"(Could not extract text from file)");
      setFileLoad(false);
    };
    reader.onerror=function(){
      setFileName("Error reading file");
      setFileLoad(false);
    };
    if(file.type==="application/pdf"||file.name.endsWith(".pdf")){
      /* PDFs: read as text — works for text-based PDFs */
      reader.readAsText(file);
    } else {
      reader.readAsText(file);
    }
  }

  function copy(){copyText(plan);setCp(true);setTimeout(function(){setCp(false);},2000);}

  return h("div",null,
    h("div",{style:{marginBottom:16}},

      h("p",{style:{color:"#64748b",fontSize:13}},"AI-generated 60-minute lesson plans for every MN "+gradeLabel+" Grade standard")
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"265px 1fr",gap:16}},
      h("div",null,
        h("div",{style:Object.assign({},C,{marginBottom:12})},
          h("div",{style:{fontWeight:800,fontSize:13,marginBottom:10,color:"#312e81"}},"Filter Standards"),
          h("input",{value:sr,onChange:function(e){setSr(e.target.value);},placeholder:"Search...",style:{width:"100%",border:"1.5px solid #e0e7ff",borderRadius:8,padding:"7px 10px",fontSize:12,outline:"none",marginBottom:10}}),
          h("div",{style:{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}},
            [["all","All"],["1","Q1"],["2","Q2"],["3","Q3"],["4","Q4"]].map(function(x){
              return h("button",{key:x[0],onClick:function(){setQf(x[0]);},style:{background:qf===x[0]?"#4f46e5":"#f5f3ff",color:qf===x[0]?"white":"#4f46e5",border:"1.5px solid "+(qf===x[0]?"#4f46e5":"#e0e7ff"),borderRadius:6,padding:"5px 10px",fontWeight:700,cursor:"pointer",fontSize:11}},x[1]);
            })

            })

        h("div",{style:C},

function QRBox(props){
  var url=props.url;
  var ref=React.useRef(null);
  React.useEffect(function(){
    if(!ref.current||!url) return;
    var el=ref.current;
    el.innerHTML="";
    /* Try to use QRCode library if available */
    if(typeof QRCode!=="undefined"){
      try{
        new QRCode(el,{text:url,width:116,height:116,
          colorDark:"#1a1a2e",colorLight:"#ffffff",
          correctLevel:QRCode.CorrectLevel&&QRCode.CorrectLevel.M||0});
        return;
      }catch(e){}
    }
    /* Fallback: show the URL as a styled text block */
    var short=url.split("?q=")[0];
    el.innerHTML="<div style=\"font-size:8px;text-align:center;padding:4px;color:#065f46;word-break:break-all;line-height:1.4\">"+
      "<div style=\"font-size:18px;margin-bottom:4px\">🔗</div>"+
      "<b>Open link below</b><br>"+short+"</div>";
  },[url]);
  return h("div",{style:{flexShrink:0}},
    h("div",{style:{width:124,height:124,border:"3px solid #6ee7b7",borderRadius:8,
                    background:"white",overflow:"hidden",display:"flex",

}

  function decodeCode(codeStr){
    /* Code format: base64 of "name|standardCode|pct|timestamp" */
    try{
      var raw=decodeURIComponent(escape(atob(codeStr.trim().replace(/[^A-Za-z0-9+/=]/g,""))));
      var parts=raw.split("|");
      if(parts.length<3) return null;
      return {name:parts[0], code:parts[1], pct:parseInt(parts[2])};
    } catch(e){ return null; }
  }

  function saveToTracker(finalResults){
    /* Only save if a class student is selected AND the standard exists in the base STD array */
    if(!selStu||!selStd||!p.setScores)return;
    /* Find the standard ID in the base STD array that matches this code */
    var matchedStd=STD.find(function(s){return s.code===selStd.code;});
    if(!matchedStd)return; /* standard not in base grade-4 STD, skip */
    var score=finalResults.length
      ?Math.round(100*finalResults.filter(function(r){return r.isCorrect;}).length/finalResults.length)
      :0;
    p.setScores(function(prev){
      var o=Object.assign({},prev);
      o[selStu.id]=Object.assign({},prev[selStu.id]||{});
      o[selStu.id][matchedStd.id]=score;
      return o;
    });
    setSavedMsg("Score saved to Mastery Tracker: "+score+"%");
    setTimeout(function(){setSavedMsg("");},4000);
  }

    setResults(newResults);
    /* If this was the last question, save to tracker immediately */

    }

            h("div",null,
              h("div",{style:{fontWeight:900,fontSize:19,fontFamily:"'Instrument Serif',serif",color:"#0f2347"}},
                (p.students.find(function(s){return s.id===selStu.id;})||selStu).name
              ),
              h("div",{style:{fontSize:12,color:"#64748b",marginTop:2}},
                stuInts.length+" interest"+(stuInts.length!==1?"s":"")+" selected")
            ),
            stuInts.length>0
              ?h("div",{style:{display:"flex",gap:5,flexWrap:"wrap",maxWidth:360,justifyContent:"flex-end"}},
                  stuInts.map(function(i){
                    return h("span",{key:i,style:{background:"#eff6ff",color:"#2563eb",fontSize:11,fontWeight:700,
                                                  padding:"3px 10px",borderRadius:20,border:"1.5px solid #2563eb"}},i);
                  })

              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},

                stuDocs[selStu.id]&&h("button",{
                  onClick:function(){deleteStuDoc(selStu.id);refreshDocs();},

              h("div",{style:{fontWeight:800,fontSize:12,color:"#64748b",textTransform:"uppercase",letterSpacing:".5px",marginBottom:10}},cat.cat),
              h("div",{style:{display:"flex",flexWrap:"wrap",gap:7}},

                    (on?"\u2713 ":"")+item

        h("div",{style:{fontSize:52,marginBottom:16}},"\uD83D\uDC64"),

/* ══════════════════════════════════════════════════════════════════
   TAB: MORNING WORK GENERATOR (NWEA / Test Data Import)
   ══════════════════════════════════════════════════════════════════ */
var NWEA_MATH_GOALS = {
  "Operations and Algebraic Thinking": ["M354","M355","M356","M357","M358","M359","M361","M362"],
  "Number and Operations in Base Ten":  ["M351","M352","M353","M354"],
  "Number and Operations - Fractions":  ["M3510","M3511","M3512","M3513","M3514","M3515","M3516"],
  "Measurement and Data":               ["M231","M232","M233","M234","M235","M236","M237","D111","D112","D113","D114","D121","D122"],
  "Geometry":                           ["M241","M242","M243","M244","M245"]
};
var NWEA_READ_GOALS = {
  "Literary Text":       ["E111","E112","E211","E311","E312","E313"],
  "Informational Text":  ["E321","E322","E323","E331","E332","E441"],
  "Vocabulary":          ["EL11","EL14","EL24","E442","E541"]
};

function TabMorning(p){
  var _STD=p.activeStds||STD;
  var gradeLabel=p.grade==="K"?"Kindergarten":(p.grade||"4")+"th";
  var isYoung=(p.grade==="K"||p.grade==="1"||p.grade==="2");
  var selStuS=useState(null); var selStu=selStuS[0]; var setSelStu=selStuS[1];
  var morningS=useState(""); var morning=morningS[0]; var setMorning=morningS[1];
  var loadingS=useState(false); var loading=loadingS[0]; var setLoading=loadingS[1];
  var numDaysS=useState(5); var numDays=numDaysS[0]; var setNumDays=numDaysS[1];
  var focusS=useState("all"); var focus=focusS[0]; var setFocus=focusS[1];
  var copiedS=useState(false); var copied=copiedS[0]; var setCopied=copiedS[1];

  function getGaps(row){
    var gaps=[];
    // Math goals below 200 are "needs work" (rough heuristic: 4th grade norm ~210-215)
    Object.keys(row.mathGoals||{}).forEach(function(goal){
      var rit=row.mathGoals[goal];
      if(rit!==null&&rit<210) gaps.push({area:goal,rit:rit,subj:"math",stds:NWEA_MATH_GOALS[goal]||[]});
    });
    Object.keys(row.readGoals||{}).forEach(function(goal){
      var rit=row.readGoals[goal];
      if(rit!==null&&rit<208) gaps.push({area:goal,rit:rit,subj:"ela",stds:NWEA_READ_GOALS[goal]||[]});
    });
    // Sort lowest first
    gaps.sort(function(a,b){return (a.rit||999)-(b.rit||999);});
    return gaps;
  }

  function genMorningWork(){
    if(!selStu||loading) return;
    var stu=p.students.find(function(s){return s.id===selStu.id;})||selStu;
    var row=null;
    var ints=(stu.interests||[]);
    var notes=(stu.notes||"");

    // Build skill gap context
    var gapDesc="";
    if(row){
      gapDesc+="\n\nNWEA MAP Test Data for "+stu.name+":";
      if(row.mathRIT) gapDesc+="\n- Math RIT Score: "+row.mathRIT+" (Grade 4 norm: ~213)";
      if(row.readRIT) gapDesc+="\n- Reading RIT Score: "+row.readRIT+" (Grade 4 norm: ~210)";
      var gaps=getGaps(row);
      if(gaps.length){
        gapDesc+="\n\nSkill Areas Needing Support (below grade norm):";
        gaps.forEach(function(g){gapDesc+="\n- "+g.area+": RIT "+g.rit+" (focus area for intervention)";});
      }
    } else {
      // Use mastery scores from tracker
      var lowStds=[];
      Object.keys(p.scores[stu.id]||{}).forEach(function(stdId){
        var sc=p.scores[stu.id][stdId];
        if(sc!=null&&sc<75){
          var std=_STD.find(function(s){return s.id===stdId;});
          if(std) lowStds.push({code:std.code,title:std.t,score:sc});
        }
      });
      if(lowStds.length){
        gapDesc+="\n\nFrom mastery tracker (scores below 75%):";
        lowStds.sort(function(a,b){return a.score-b.score;});
        lowStds.slice(0,5).forEach(function(s){gapDesc+="\n- "+s.code+" "+s.title+": "+s.score+"%";});
      }
    }

    var focusInstr = focus==="math"?"Focus ONLY on math standards.":focus==="ela"?"Focus ONLY on ELA/reading standards.":"Mix math and reading/ELA equally.";
    var interestNote = ints.length?"Student interests to weave into problems: "+ints.join(", ")+". Use these as contexts for word problems and reading passages.":"";
    var noteNote = notes?"Teacher notes: "+notes:"";

    var gradeNum=p.grade==="K"?0:parseInt(p.grade)||4;
    var isYoungMW=(gradeNum<=2);
    var prompt=(
      isYoungMW
      ? "You are a K-2 teacher making FUN colorful morning work for "+stu.name+" ("+gradeLabel+" grade).\n"
        +gapDesc+"\n\n"+interestNote+"\n"+noteNote+"\n\n"+focusInstr+"\n\n"
        +"Generate "+numDays+" days. K-2 RULES:\n"
        +"- Start each day: STAR DAY [N] - [WEEKDAY] STAR\n"
        +"- Sections: [MATH TIME] and [READING TIME]\n"
        +"- Add 2 fun emojis per problem (animals, stars, food)\n"
        +"- Max 8 words per problem. Very simple language.\n"
        +"- Include 1 drawing prompt per day: Draw your answer here: [___]\n"
        +"- End each day: You earned ___ stars today! Great job!\n"
        +"- Use dinosaurs, puppies, superheroes as fun characters.\n"
        +"Plain text only."
      : (gradeNum<=5)
      ? "You are a grade "+p.grade+" MN teacher making targeted morning work for "+stu.name+".\n"
        +gapDesc+"\n\n"+interestNote+"\n"+noteNote+"\n\n"+focusInstr+"\n\n"
        +"Generate "+numDays+" days. FORMAT EACH DAY:\n"
        +"DAY [N] - [WEEKDAY]\n"
        +"[MATH WARM-UP] 2-3 targeted problems\n"
        +"[READING/ELA] 1-2 problems\n"
        +"[CHALLENGE BONUS] 1 extension problem\n"
        +"Use MCA-style A B C D format where appropriate. Plain text only."
      : "You are a grade "+p.grade+" MN teacher making rigorous morning work for "+stu.name+".\n"
        +gapDesc+"\n\n"+interestNote+"\n"+noteNote+"\n\n"+focusInstr+"\n\n"
        +"Generate "+numDays+" days. FORMAT EACH DAY:\n"
        +"DAY [N] | [WEEKDAY]\n"
        +"BELL RINGER: 1 review problem\n"
        +"SKILL PRACTICE: 2-3 targeted problems\n"
        +"EXTENSION: 1 higher-order thinking problem\n"
        +"Use MCA-style questions with academic vocabulary. Plain text only."
    )+"\n\n"

    function doGen(extraCtx){
      var fp=extraCtx?prompt+"\n\nSTUDENT REPORT CONTENT (use to find weakest skills):\n"+extraCtx:prompt;
      api(fp, 1500).then(function(d){
        setMorning(gt(d)||"Error generating. Please try again.");
        setLoading(false);
      }).catch(function(){
        setMorning("Connection error. Please try again.");
        setLoading(false);
      });
    }
    // Auto-load document from student profile
    var stuDoc=selStu?loadStuDoc(selStu.id):null;
    setTimeout(function(){ doGen(stuDoc?stuDoc.text:null); }, 50);
  }

  function copyMorning(){copyText(morning);setCopied(true);setTimeout(function(){setCopied(false);},2000);}

  return h("div",null,
    h("div",{style:{marginBottom:16}},
      h("h2",{style:{fontFamily:"'Instrument Serif',serif",fontSize:22,fontWeight:700,margin:"0 0 4px"}},"\uD83C\uDF05 Morning Work Generator"),
      h("p",{style:{color:"#64748b",fontSize:13,margin:0}},"Import NWEA MAP or standardized test data. The AI analyzes skill gaps and generates personalized daily morning work aligned to MN 4th Grade Standards.")
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"300px 1fr",gap:16}},

      /* Config panel */
      h("div",null,
        h("div",{style:{background:"white",borderRadius:12,padding:16,boxShadow:"0 1px 8px rgba(0,0,0,.07)"}},
          h("div",{style:{fontWeight:800,fontSize:14,marginBottom:14,color:"#0f2347"}},"Step 2: Configure Morning Work"),

          h("label",{style:{fontSize:12,fontWeight:700,color:"#64748b",display:"block",marginBottom:5}},"Student"),
          h("select",{value:selStu?selStu.id:"",onChange:function(e){var f=p.students.find(function(s){return s.id==e.target.value;});setSelStu(f||null);setMorning("");},
            style:{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:8,padding:"7px 10px",fontSize:13,background:"white",marginBottom:12}},
            h("option",{value:""},"-- Select student --"),

        selStu&&loadStuDoc(selStu.id)
          ?h("div",{style:{background:"#f0fdf4",border:"1px solid #059669",borderRadius:8,
              padding:"6px 10px",marginTop:6,fontSize:11,fontWeight:700,color:"#059669"}},
              "\uD83D\uDCC4 "+((loadStuDoc(selStu.id)||{}).fileName||"Report")+" — will be used to target weak areas")
          :h("div",{style:{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:8,
              padding:"6px 10px",marginTop:6,fontSize:11,color:"#9a3412"}},
              "\uD83D\uDCCE No report uploaded — add one in Student Profiles tab"),
            p.students.map(function(s){return h("option",{key:s.id,value:s.id},s.name);})
          ),

          h("label",{style:{fontSize:12,fontWeight:700,color:"#64748b",display:"block",marginBottom:5}},"Number of Days"),
          h("div",{style:{display:"flex",gap:6,marginBottom:12}},
            [["1","1 Day"],["3","3 Days"],["5","Full Week"]].map(function(pair){
              return h("button",{key:pair[0],onClick:function(){setNumDays(parseInt(pair[0]));},
                style:{flex:1,background:numDays===parseInt(pair[0])?"#0f2347":"#f8fafc",color:numDays===parseInt(pair[0])?"white":"#475569",border:"2px solid "+(numDays===parseInt(pair[0])?"#0f2347":"#e2e8f0"),borderRadius:8,padding:"8px 4px",cursor:"pointer",fontWeight:700,fontSize:12,textAlign:"center"}},
                h("div",{style:{fontWeight:800}},pair[1])
              );
            })
          ),

          h("label",{style:{fontSize:12,fontWeight:700,color:"#64748b",display:"block",marginBottom:5}},"Focus Area"),
          h("div",{style:{display:"flex",gap:6,marginBottom:14}},
            [["all","Both"],["math","Math"],["ela","ELA"]].map(function(pair){
              return h("button",{key:pair[0],onClick:function(){setFocus(pair[0]);},
                style:{flex:1,background:focus===pair[0]?"#0f2347":"#f8fafc",color:focus===pair[0]?"white":"#475569",border:"2px solid "+(focus===pair[0]?"#0f2347":"#e2e8f0"),borderRadius:8,padding:"8px 4px",cursor:"pointer",fontWeight:700,fontSize:12,textAlign:"center"}},
                pair[1]
              );
            })
          ),

          /* Student summary box */
          selStu&&selStu.id ? (function(){
            var stu=p.students.find(function(s){return s.id===selStu.id;})||selStu;
            var ints=(stu.interests||[]);
            var nweaRow=(p.nweaData||[]).find(function(r){return r.matched&&r.matched.id===stu.id;});
            var gaps=nweaRow?getGaps(nweaRow):[];
            var trackerLow=Object.keys(p.scores[stu.id]||{}).filter(function(sid){return (p.scores[stu.id][sid]||0)<75;}).length;
            return h("div",{style:{background:"#f0f9ff",border:"1.5px solid #bae6fd",borderRadius:8,padding:"10px 12px",marginBottom:12}},
              h("div",{style:{fontWeight:800,fontSize:13,color:"#0369a1",marginBottom:6}},stu.name),
              ints.length ? h("div",{style:{fontSize:11,color:"#64748b",marginBottom:4}},"\uD83C\uDFAF Interests: "+ints.slice(0,4).join(", ")+(ints.length>4?" +more":"")) : h("div",{style:{fontSize:11,color:"#f59e0b",marginBottom:4}},"\u26A0\uFE0F No interests set — go to Student Profiles tab"),
              nweaRow ? h("div",{style:{fontSize:11,color:"#64748b",marginBottom:2}},"\uD83D\uDCCA NWEA: Math "+( nweaRow.mathRIT||"--")+" | Read "+(nweaRow.readRIT||"--")) : h("div",{style:{fontSize:11,color:"#64748b"}},"\uD83D\uDCCB Using mastery tracker data ("+trackerLow+" standards below 75%)")
            );
          })() : null,

          h("button",{onClick:genMorningWork,disabled:!selStu||loading,
            style:{width:"100%",background:!selStu||loading?"#94a3b8":"linear-gradient(135deg,#f59e0b,#d97706)",color:!selStu||loading?"white":"#1a1a2e",border:"none",borderRadius:10,padding:"13px",fontWeight:900,fontSize:15,cursor:!selStu||loading?"not-allowed":"pointer",transition:"all .2s"}},
            loading?"\u23F3 Generating...":"\uD83C\uDF05 Generate Morning Work"
          )
        ),

        /* Legend */
        h("div",{style:{background:"white",borderRadius:12,padding:14,boxShadow:"0 1px 8px rgba(0,0,0,.07)",marginTop:12}},
          h("div",{style:{fontWeight:700,fontSize:12,marginBottom:8,color:"#64748b"}},"RIT SCORE GUIDE"),
          [["Below 208","Needs support",  "#dc2626"],["208-218","Approaching",  "#d97706"],["219+","At/above grade","#059669"]].map(function(r){
            return h("div",{key:r[0],style:{display:"flex",alignItems:"center",gap:8,marginBottom:5}},
              h("div",{style:{width:10,height:10,borderRadius:"50%",background:r[2]}}),
              h("span",{style:{fontSize:11}},h("b",null,r[0])," - ",r[1])
            );
          }),
          h("div",{style:{marginTop:8,fontSize:11,color:"#94a3b8",borderTop:"1px solid #f1f5f9",paddingTop:8}},
            "Grade 4 NWEA norms: Math ~213, Reading ~210 (fall)"
          )
        )
      ),

      /* Output panel */
      h("div",null,
        loading ? h("div",{style:{background:"white",borderRadius:12,padding:60,textAlign:"center",boxShadow:"0 1px 8px rgba(0,0,0,.07)"}},
          h("div",{className:"spin",style:{fontSize:48,display:"block",marginBottom:16}},"\uD83C\uDF05"),
          h("div",{style:{fontWeight:800,fontSize:18,color:"#d97706",marginBottom:8}},"Generating Personalized Morning Work..."),
          h("div",{style:{color:"#64748b",fontSize:14}},selStu&&(p.students.find(function(s){return s.id===selStu.id;})||{name:""}).name),
          h("div",{style:{fontSize:12,color:"#94a3b8",marginTop:6}},"Analyzing skill gaps and weaving in student interests...")
        ) : null,

function getMCAExamples(grade, subj){
  var key=(grade||"4")+"_"+(subj||"math");
  return MCA_Q_EXAMPLES[key]||MCA_Q_EXAMPLES["4_math"]||[];
}

function buildMCAExampleSnippet(grade, subj, maxQ){
  var examples=getMCAExamples(grade,subj);
  if(!examples.length) return "";
  var sample=examples.slice(0,Math.min(maxQ||3,examples.length));
  var out="\n\n=== REAL MCA QUESTION EXAMPLES FOR THIS GRADE (model your questions after these exactly) ===\n";
  sample.forEach(function(ex,i){
    out+="\nExample "+(i+1)+" ["+ex.b+"]:\n";
    out+="Q: "+ex.q+"\n";
    ex.ch.forEach(function(c){out+=c+"\n";});
    out+="Correct: "+["A","B","C","D"][ex.a]+"\n";
    out+="Distractor logic: "+ex.e+"\n";
  });
  out+="=== END EXAMPLES — match this format, rigor, and real-world context exactly ===";
  return out;
}



/* ELA quiz prompt builder — passage-based format */
function buildELAQuizPrompt(gradeLabel, grade, std, displayName, interests, numQ){
  var ctx = getMCAELACtx(grade||"4");
  var interestLine = interests&&interests.length ? "\nStudent interests: "+interests.join(", ")+". Use one of these as the topic of the passage where it fits naturally." : "";
  return "You are creating an MCA-aligned ELA formative assessment for a "+gradeLabel+" grade student named "+displayName+".\n\n"+
    "Standard: "+std.code+" — "+std.t+"\nDescription: "+std.d+"\nGrade: "+gradeLabel+interestLine+"\n\n"+
    "MCA ELA FORMAT: Write a SHORT original passage (3-5 sentences or 2-3 short paragraphs, "+gradeLabel+"-appropriate) followed by EXACTLY "+numQ+" multiple-choice questions about the passage.\n\n"+
    "PASSAGE TYPES for this grade: "+ctx.passageTypes+"\n"+
    "SKILLS TESTED: "+ctx.skills+"\n"+
    "TYPICAL QUESTION TYPES: "+ctx.questionTypes+"\n"+
    "DISTRACTORS target these misconceptions: "+ctx.misconceptions+"\n\n"+
    "FORMAT — respond ONLY with valid JSON (no markdown):\n"+
    "{\"passage\":\"...\",\"questions\":[{\"question\":\"...\",\"choices\":[\"A. ...\",\"B. ...\",\"C. ...\",\"D. ...\"],\"correct\":0,\"explanation\":\"...\"}]}\n\n"+
    "Rules: passage must be original (not copied), questions must require reading the passage to answer, vary correct answer positions (0-3), plain JSON only."+buildMCAExampleSnippet(grade||"4","ela",2);
}

  var mSuS=useState(IS[0]);var mSu=mSuS[0];var setMSu=mSuS[1];
  var mStS=useState(STD[0]);var mSt=mStS[0];var setMSt=mStS[1];
  var nweaS=useState([]);var nwea=nweaS[0];var setNwea=nweaS[1];
  var gradeS=useState("4");var grade=gradeS[0];var setGrade=gradeS[1];
  var activeStds=useMemo(function(){return grade==="4"?STD:(ALL_GRADE_STDS[grade]||STD);}, [grade]);

  var TABS=[
    {id:"map",      lbl:"\uD83D\uDDFA\uFE0F Standards Map"},
    {id:"profiles", lbl:"\uD83D\uDC64 Student Profiles"},
    {id:"tracker",  lbl:"\u270F\uFE0F Mastery Tracker"},
    {id:"dash",     lbl:"\uD83D\uDCCA Dashboard"},
    {id:"morning",  lbl:"\uD83C\uDF05 Morning Work"},
    {id:"lessons",  lbl:"\uD83D\uDCCB Lesson Plans"},
    {id:"slides",   lbl:"\uD83D\uDCF9 Slide Deck"},
    {id:"inclusion",lbl:"\u267F Inclusion"},
    {id:"quiz",     lbl:"\uD83C\uDFAF Student Quiz"},
    {id:"mats",     lbl:"\u2728 Materials"}
  ];

  /* ── Score modal state ── */
  function decodeAndSave(){
    try{
      var raw=decodeURIComponent(escape(atob(smCode.trim().replace(/[^A-Za-z0-9+/=]/g,""))));
      var parts=raw.split("|");
      if(parts.length<3) throw new Error("bad");
      var sName=parts[0]; var stdCode=parts[1]; var pct=parseInt(parts[2]);
      if(isNaN(pct)||pct<0||pct>100) throw new Error("bad pct");
      var foundStu=stu.find(function(s){return s.name.toLowerCase().trim()===sName.toLowerCase().trim();});
      var foundStd=STD.find(function(s){return s.code===stdCode;});
      if(!foundStu){setSmMsg("Student '"+sName+"' not found in roster.");setSmOk(false);return;}
      if(!foundStd){setSmMsg("Standard '"+stdCode+"' not found.");setSmOk(false);return;}
      setSc(function(prev){
        var o=Object.assign({},prev);
        o[foundStu.id]=Object.assign({},prev[foundStu.id]||{});
        o[foundStu.id][foundStd.id]=pct;
        return o;
      });
      setSmMsg("\u2705 Saved! "+sName+" \u2192 "+stdCode+" \u2192 "+pct+"%");
      setSmOk(true);setSmCode("");
      setTimeout(function(){setSmMsg("");setSmOk(false);},5000);
    }catch(e){setSmMsg("Invalid code. Check it was typed correctly.");setSmOk(false);}
  }
  var ScoreModal=showSM?h("div",{style:{position:"fixed",top:0,left:0,right:0,bottom:0,
      background:"rgba(0,0,0,.55)",zIndex:9999,display:"flex",alignItems:"center",
      justifyContent:"center",padding:16}},
    h("div",{style:{background:"white",borderRadius:20,padding:28,width:"100%",maxWidth:440,
                    boxShadow:"0 20px 60px rgba(0,0,0,.3)"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        h("div",{style:{fontWeight:900,fontSize:18,color:"#312e81"}},"\uD83D\uDCF1 Enter Student Quiz Code"),
        h("button",{onClick:function(){setShowSM(false);setSmMsg("");setSmCode("");},
          style:{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#94a3b8",lineHeight:1}},
          "\u00d7")
      ),
      h("div",{style:{fontSize:13,color:"#6b7280",marginBottom:16,lineHeight:1.6}},
        "Student finished their quiz? Enter the code shown on their screen to save the score to the Mastery Tracker."),
      h("div",{style:{display:"flex",gap:8,marginBottom:12}},
        h("input",{
          value:smCode,
          onChange:function(e){setSmCode(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,""));},
          onKeyDown:function(e){if(e.key==="Enter"&&smCode.length>=8)decodeAndSave();},
          placeholder:"Student completion code...",autoFocus:true,
          style:{flex:1,border:"2px solid #e0e7ff",borderRadius:10,padding:"11px 14px",
                 fontSize:14,fontFamily:"monospace",fontWeight:700,letterSpacing:"2px",
                 outline:"none",color:"#1a1a2e"}
        }),
        h("button",{onClick:decodeAndSave,disabled:smCode.length<8,
          style:{background:smCode.length>=8?"#059669":"#e2e8f0",
                 color:smCode.length>=8?"white":"#9ca3af",
                 border:"none",borderRadius:10,padding:"11px 18px",
                 cursor:smCode.length>=8?"pointer":"default",fontWeight:900,fontSize:14,
                 whiteSpace:"nowrap",transition:"all .15s"}},"Save Score")
      ),
      smMsg&&h("div",{style:{padding:"10px 14px",borderRadius:10,fontSize:13,fontWeight:700,
                              background:smOk?"#f0fdf4":"#fef2f2",
                              color:smOk?"#059669":"#dc2626",
                              border:"1.5px solid "+(smOk?"#6ee7b7":"#fca5a5")}},smMsg)
    )
  ):null;
  var FloatBtn=tb==="quiz"?h("button",{
    onClick:function(){setShowSM(true);setSmMsg("");},
    title:"Enter student quiz completion code",
    style:{position:"fixed",bottom:20,right:20,zIndex:9000,
           background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"white",
           border:"none",borderRadius:50,padding:"12px 20px",fontWeight:900,fontSize:13,
           cursor:"pointer",boxShadow:"0 4px 20px rgba(99,102,241,.5)",
           display:"flex",alignItems:"center",gap:8,fontFamily:"inherit"}},
    h("span",{style:{fontSize:18}},"\uD83D\uDCF1"),"Enter Quiz Code"
  ):null;

  if(!authReady) return h("div",{style:{minHeight:"100vh",background:"#0f2347",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:18,fontFamily:"'DM Sans',sans-serif"}},"⏳ Loading...");
  if(!user) return h(LoginScreen,null);
  return h("div",{style:{fontFamily:"'DM Sans',sans-serif",background:"#f5f3ef",minHeight:"100vh",color:"#0f2347"}},
    /* ── HEADER ── */
    h("div",{className:"hub-hdr"},
      h("div",{className:"hub-logo"},"\uD83C\uDF4E"),
      h("div",null,
        h("div",{className:"hub-name"},"MN Standards Hub"),
        h("div",{className:"hub-sub"},(grade==="K"?"Kindergarten":grade+"th")+" Grade  \u00b7  "+activeStds.length+" Standards  \u00b7  "+stu.length+" Students")
      ),
      h("div",{className:"grade-switcher"},
        ["K","1","2","3","4","5","6","7","8"].map(function(g){
          return h("button",{key:g,className:"grade-btn"+(grade===g?" active":""),onClick:function(){setGrade(g);}},g);
        })
      ),
      h("div",{className:"hdr-right"},
        MST.map(function(m){return h("div",{key:m.label,className:"mastery-chip"},h("span",{style:{color:m.color}},"\u25cf "),m.label+": "+m.min+"\u2013"+m.max+"%");})
      )
    ),
    /* ── TAB BAR ── */
    h("div",{className:"hub-tabs"},
      TABS.map(function(t){return h("button",{key:t.id,className:"hub-tab"+(tb===t.id?" active":""),onClick:function(){setTb(t.id);}},t.lbl);})
    ),
    /* ── CONTENT ── */
    h("div",{className:"hub-body"},
      tb==="map"    ?h(TabMap,    {qf:qf,setQf:setQf,sf:sf,setSf:setSf,activeStds:activeStds,grade:grade}):null,
      tb==="tracker"?h(TabTracker,{students:stu,setStudents:setStu,scores:sc,setScores:setSc,tStu:tS,setTStu:setTS,activeStds:activeStds,grade:grade}):null,
      tb==="dash"   ?h(TabDash,   {students:stu,scores:sc,ds:ds,setDs:setDs,dStu:dS,setDStu:setDS,setTab:setTb,setTStu:setTS,activeStds:activeStds,grade:grade}):null,
      tb==="lessons"?h(TabLessons,{activeStds:activeStds,grade:grade,lastPlan:lastPlan,setLastPlan:setLastPlan}):null,
      tb==="quiz"   ?h(TabQuiz,   {activeStds:activeStds,grade:grade,students:stu,scores:sc,setScores:setSc}):null,
      tb==="mats"   ?h(TabMats,   {students:stu,scores:sc,mStu:mSu,setMStu:setMSu,mStd:mSt,setMStd:setMSt,activeStds:activeStds,grade:grade}):
      tb==="library"?h(TabLibrary,{user:user}):
      tb==="slides"   ?h(TabSlides,  {activeStds:activeStds,grade:grade,lastPlan:lastPlan}):null,
      tb==="profiles" ?h(TabProfiles,{students:stu,setStudents:setStu,scores:sc}):null,
      tb==="morning"  ?h(TabMorning, {students:stu,scores:sc,nweaData:nwea,setNweaData:setNwea,activeStds:activeStds,grade:grade}):null,
      tb==="inclusion"?h(TabInclusion,{students:stu,setStudents:setStu,scores:sc,activeStds:activeStds}):null
    ),
    ScoreModal,
    FloatBtn
  );
}

try{
  ReactDOM.render(h(App,null),document.getElementById("root"));
}catch(err){
  document.getElementById("root").innerHTML='<div style="padding:30px;background:white;border:2px solid red;border-radius:10px;color:red;font-family:monospace">Error: '+err.message+'</div>';
}

})();
</script>
</body>
</html>
